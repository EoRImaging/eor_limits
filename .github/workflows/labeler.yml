name: Labeler

on:
  push:
    branches:
      - main

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.3

      - name: Run Labeler
        uses: crazy-max/ghaction-github-labeler@v6.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
