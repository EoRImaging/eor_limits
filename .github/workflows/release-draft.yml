name: Update Draft Release

on: push

jobs:
  draft-release:
    name: Update Draft Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0

      - name: Publish the release notes
        uses: release-drafter/release-drafter@v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
